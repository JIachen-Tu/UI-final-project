{% extends "layout.html" %}
{% block content %}
    <div id="quiz-container" data-quiz-id="{{ question.quiz_id }}" data-next-question="{{ question.next_question }}">
    <h3>Question {{ question.quiz_id }}: {{ question.question }}</h3>
    <div class="list-group my-4">
        {% for option in question.options %}
            <button class="list-group-item list-group-item-action option-btn">{{ option }}</button>
        {% endfor %}
    </div>
    </div>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
{% endblock %}
