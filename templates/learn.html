{% extends "layout.html" %}
{% block content %}
    <h1>{{ lesson.title }}</h1>
    <div class="my-4 d-flex justify-content-center">
        <video controls style="max-width: 700px; max-height: 500px; width: auto; height: auto;">
            <source src="{{ lesson.media }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <p class="lead">{{ lesson.text }}</p>

    <button id="next-btn" class="btn btn-primary" data-next="{{ lesson.next_lesson }}" data-lesson-id="{{ lesson.lesson_id }}">Next</button>
    <script src="{{ url_for('static', filename='js/learn.js') }}"></script>
{% endblock %}
